---
watcher_repo: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/watcher-operator"
watcher_hook: "{{ watcher_repo }}/ci/playbooks/deploy_watcher_service.yaml"
watcher_coo_hook: "{{ watcher_repo }}/ci/playbooks/deploy_cluster_observability_operator.yaml"

# Watcher deploy playbooks
pre_deploy_create_coo_subscription:
  - name: Deploy cluster-observability-operator
    type: playbook
    source: "{{ watcher_coo_hook }}"
post_deploy:
  - name: Deploy watcher service
    type: playbook
    source: "{{ watcher_hook }}"
    extra_vars: >-
      {{
        deploy_watcher_service_extra_vars | default({}) |
        combine({ 'watcher_repo': watcher_repo })
      }}

# controlplane customization to deploy telemetry service
# customMonitoringStack is used here to allow us to enable
# enableRemoteWriteReceiver, needed when pushing fake metrics
# to Prometheus server, via watcher-tempest-plugin.
cifmw_edpm_prepare_timeout: 60
cifmw_edpm_prepare_kustomizations:
  - apiVersion: kustomize.config.k8s.io/v1beta1
    kind: Kustomization
    namespace: openstack
    patches:
    - patch: |-
        apiVersion: core.openstack.org/v1beta1
        kind: OpenStackControlPlane
        metadata:
          name: unused
        spec:
          tls:
            podLevel:
              enabled: false
            ingress:
              enabled: false
          telemetry:
            enabled: true
            template:
              metricStorage:
                enabled: true
                customMonitoringStack:
                  alertmanagerConfig:
                    disabled: true
                  prometheusConfig:
                    replicas: 1
                    enableRemoteWriteReceiver: true
                    scrapeInterval: 30s
                    persistentVolumeClaim:
                      resources:
                        requests:
                          storage: 20G
                  resourceSelector:
                    matchLabels:
                      service: metricStorage
                  retention: 24h
      target:
        kind: OpenStackControlPlane
    - patch: |-
        - op: remove
          path: /spec/telemetry/template/metricStorage/monitoringStack
      target:
        kind: OpenStackControlPlane
cifmw_install_yamls_whitelisted_vars:
  - 'WATCHER_REPO'
  - 'WATCHER_BRANCH'
  - 'OUTPUT_DIR'
  - 'KUBECONFIG'

cifmw_install_yamls_environment:
  KUBECONFIG: /home/zuul/.crc/machines/crc/kubeconfig
  BMO_SETUP: 'false'
  CHECKOUT_FROM_OPENSTACK_REF: 'true'
  OPENSTACK_K8S_BRANCH: main
  OPENSTACK_REPO: "/home/zuul/src/github.com/openstack-k8s-operators/openstack-operator"
  OUT: /home/zuul/ci-framework-data/artifacts/manifests
  OUTPUT_DIR: /home/zuul/ci-framework-data/artifacts/edpm
  DATAPLANE_TLS_ENABLED: false

cifmw_update_containers_tag: current
cifmw_update_containers_registry: "{{ watcher_registry_url | split('/') | first }}"
cifmw_update_containers_org: "{{ watcher_registry_url | split('/') | last }}"
